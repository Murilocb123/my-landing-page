<header
  [class]="
    'navbar' +
    (isScrolled() ? ' navbar--scrolled' : '') +
    (menuOpen() ? ' navbar--menu-open' : '')
  "
  role="banner"
>
  <a href="#main-content" class="skip-link">Pular para o conteúdo</a>

  <div class="navbar__inner">
    <!-- Logo (troca por tema: logo-dark p/ tema escuro, logo-light p/ tema claro) -->
    <button class="navbar__logo" (click)="scrollTo('home')" aria-label="Início">
      <img
        [ngSrc]="themeService.theme() === 'dark' ? '/images/logo-dark.webp' : '/images/logo-light.webp'"
        alt=""
        width="491"
        height="410"
        priority
        class="navbar__logo-img"
      />
    </button>

    <!-- Desktop nav -->
    <nav class="navbar__nav" aria-label="Navegação principal">
      <ul class="navbar__links" role="list">
        @for (item of navItems; track item.id) {
          <li>
            <button
              class="nav-link"
              [class.nav-link--active]="activeSection() === item.id"
              (click)="scrollTo(item.id)"
              [attr.aria-current]="activeSection() === item.id ? 'page' : null"
            >
              <span class="nav-link__prefix">this.</span><span class="nav-link__method">{{ langService.t().nav[item.labelKey] }}</span>
            </button>
          </li>
        }
      </ul>
    </nav>

    <div class="navbar__actions">
      <!-- Theme toggle -->
      <button
        class="theme-toggle"
        type="button"
        (click)="toggleTheme()"
        [attr.aria-label]="themeService.theme() === 'dark' ? 'Ativar tema claro' : 'Ativar tema escuro'"
        [attr.aria-pressed]="themeService.theme() === 'light'"
        title="Alternar tema"
      >
        @if (themeService.theme() === 'dark') {
          <!-- Sun icon: clicar pra ir pro light -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" width="16" height="16">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2"></path>
            <path d="M12 20v2"></path>
            <path d="m4.93 4.93 1.41 1.41"></path>
            <path d="m17.66 17.66 1.41 1.41"></path>
            <path d="M2 12h2"></path>
            <path d="M20 12h2"></path>
            <path d="m6.34 17.66-1.41 1.41"></path>
            <path d="m19.07 4.93-1.41 1.41"></path>
          </svg>
        } @else {
          <!-- Moon icon: clicar pra ir pro dark -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" width="16" height="16">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
          </svg>
        }
      </button>

      <!-- Language toggle -->
      <button
        class="lang-toggle"
        (click)="toggleLang()"
        [attr.aria-label]="langService.lang() === 'pt' ? 'Switch to English' : 'Mudar para Português'"
      >
        {{ langService.lang() === 'pt' ? 'EN' : 'PT' }}
      </button>

      <!-- Hamburger (mobile) -->
      <button
        class="hamburger"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen()"
        aria-controls="mobile-menu"
        aria-label="Abrir menu de navegação"
      >
        <span class="hamburger__line" [class.hamburger__line--open]="menuOpen()"></span>
        <span class="hamburger__line" [class.hamburger__line--open]="menuOpen()"></span>
        <span class="hamburger__line" [class.hamburger__line--open]="menuOpen()"></span>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  @if (menuOpen()) {
    <nav id="mobile-menu" class="mobile-menu" aria-label="Navegação mobile">
      <ul role="list">
        @for (item of navItems; track item.id) {
          <li>
            <button
              class="mobile-nav-link"
              [class.mobile-nav-link--active]="activeSection() === item.id"
              (click)="scrollTo(item.id)"
              [attr.aria-current]="activeSection() === item.id ? 'page' : null"
            >
              <span class="mobile-nav-link__prefix">this.</span><span class="mobile-nav-link__method">{{ langService.t().nav[item.labelKey] }}</span>
            </button>
          </li>
        }
      </ul>
    </nav>
  }
</header>
