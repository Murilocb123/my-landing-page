  <!--
    Resolve o tema antes do CSS pintar pra evitar FOUC (flash do tema padrão
    quando o usuário tem o oposto salvo). Roda síncrono, sem dependências.
    Lógica idêntica ao ThemeService.resolveInitialTheme().
  -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme-preference');
        var theme =
          saved === 'dark' || saved === 'light'
            ? saved
            : window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
