<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" width="1600" height="900">
  <defs>
    <filter id="blur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#081025" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#081025" stop-opacity="0" />
      <stop offset="100%" stop-color="#081025" stop-opacity="0.9" />
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#081025" stop-opacity="0" />
      <stop offset="100%" stop-color="#081025" stop-opacity="0.75" />
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="#081025" />

  <g filter="url(#blur)" opacity="0.9">
    <rect x="0" y="60"  width="1600" height="10" fill="#1e6fff" opacity="0.35" />
    <rect x="0" y="120" width="1600" height="14" fill="#3d87ff" opacity="0.55" />
    <rect x="0" y="180" width="1600" height="8"  fill="#1e6fff" opacity="0.25" />
    <rect x="0" y="230" width="1600" height="12" fill="#1F51AF" opacity="0.5" />
    <rect x="0" y="300" width="1600" height="18" fill="#3d87ff" opacity="0.65" />
    <rect x="0" y="360" width="1600" height="10" fill="#1e6fff" opacity="0.4" />
    <rect x="0" y="420" width="1600" height="6"  fill="#5a9dff" opacity="0.5" />
    <rect x="0" y="470" width="1600" height="16" fill="#1F51AF" opacity="0.55" />
    <rect x="0" y="540" width="1600" height="12" fill="#3d87ff" opacity="0.6" />
    <rect x="0" y="610" width="1600" height="8"  fill="#1e6fff" opacity="0.3" />
    <rect x="0" y="660" width="1600" height="14" fill="#1F51AF" opacity="0.5" />
    <rect x="0" y="730" width="1600" height="10" fill="#3d87ff" opacity="0.55" />
    <rect x="0" y="790" width="1600" height="16" fill="#1e6fff" opacity="0.4" />
  </g>

  <rect width="1600" height="900" fill="url(#vignette)" />
  <rect width="1600" height="900" fill="url(#fade)" opacity="0.4" />
</svg>
